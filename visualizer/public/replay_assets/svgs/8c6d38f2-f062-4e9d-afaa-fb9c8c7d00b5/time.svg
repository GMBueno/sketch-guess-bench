<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'><rect width='100%' height='100%' fill='#f7f9fc'/><!-- Clock (left) --><g transform='translate(0,10)'><circle cx='150' cy='150' r='100' fill='#ffffff' stroke='#2b2b2b' stroke-width='6'/><!-- ticks --><g stroke='#2b2b2b' stroke-width='6' stroke-linecap='round'><line x1='150' y1='55' x2='150' y2='78'/><line x1='150' y1='222' x2='150' y2='245'/><line x1='55' y1='150' x2='78' y2='150'/><line x1='222' y1='150' x2='245' y2='150'/></g><!-- hands --><g stroke='#2b2b2b' stroke-linecap='round' stroke-linejoin='round'><line x1='150' y1='150' x2='200' y2='110' stroke-width='8'/><line x1='150' y1='150' x2='178' y2='162' stroke-width='12'/><circle cx='150' cy='150' r='6' fill='#2b2b2b'/></g></g><!-- Hourglass (right) --><g transform='translate(0,20)'><!-- caps --><rect x='320' y='120' width='120' height='20' rx='8' fill='#3b3b3b'/><rect x='320' y='380' width='120' height='20' rx='8' fill='#3b3b3b'/><!-- sides --><line x1='330' y1='120' x2='330' y2='400' stroke='#2b2b2b' stroke-width='8' stroke-linecap='round'/><line x1='430' y1='120' x2='430' y2='400' stroke='#2b2b2b' stroke-width='8' stroke-linecap='round'/><!-- glass bulbs --><polygon points='330,140 430,140 380,220' fill='#ffffff' stroke='#2b2b2b' stroke-width='6'/><polygon points='330,380 430,380 380,300' fill='#ffffff' stroke='#2b2b2b' stroke-width='6'/><!-- sand top --><polygon points='350,150 410,150 380,195' fill='#f0c419' opacity='0.95'/><!-- falling grain --><circle cx='380' cy='235' r='5' fill='#f0c419'/><!-- sand bottom (mound) --><path d='M345 340 Q380 320 415 340 L380 300 Z' fill='#f0c419' opacity='0.95' transform='translate(0,0)'/></g></svg>