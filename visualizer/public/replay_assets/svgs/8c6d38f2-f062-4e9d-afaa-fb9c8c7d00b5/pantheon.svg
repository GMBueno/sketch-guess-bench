<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- sky background -->
  <rect width="100%" height="100%" fill="#cfeaff" />

  <!-- dome (behind) -->
  <path d="M96,220 A160,160 0 0,1 416,220 L416,220 L96,220 Z" fill="#c97c44" stroke="#9a5b36" stroke-width="3" />

  <!-- pediment (triangle) -->
  <polygon points="96,220 256,150 416,220" fill="#e9d3b3" stroke="#b99b7a" stroke-width="3" />

  <!-- entablature / cornice above columns -->
  <rect x="96" y="220" width="320" height="24" fill="#d9cbb2" stroke="#b89f82" stroke-width="2" />

  <!-- columns (8) -->
  <g>
    <rect x="108" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />
    <rect x="148" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />
    <rect x="188" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />
    <rect x="228" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />
    <rect x="268" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />
    <rect x="308" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />
    <rect x="348" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />
    <rect x="388" y="244" width="16" height="96" rx="2" fill="#f6efe1" stroke="#c8b8a0" stroke-width="2" />

    <!-- capitals -->
    <rect x="104" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
    <rect x="144" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
    <rect x="184" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
    <rect x="224" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
    <rect x="264" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
    <rect x="304" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
    <rect x="344" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
    <rect x="384" y="232" width="24" height="12" rx="2" fill="#e9d3b3" stroke="#b99b7a" stroke-width="2" />
  </g>

  <!-- base plinth under columns -->
  <rect x="96" y="340" width="320" height="20" fill="#d9cbb2" stroke="#b89f82" stroke-width="2" />

  <!-- central doorway (arched) -->
  <path d="M224,340 A32,32 0 0,1 288,340 L288,380 L224,380 Z" fill="#5b3a2a" stroke="#432a1d" stroke-width="2" />

  <!-- steps below -->
  <rect x="80" y="380" width="352" height="16" fill="#d9d9d9" />
  <rect x="72" y="396" width="368" height="16" fill="#d0d0d0" />
  <rect x="64" y="412" width="384" height="32" fill="#c7c7c7" />

  <!-- oculus (window at dome center) -->
  <circle cx="256" cy="180" r="18" fill="#0f0f0f" />

  <!-- subtle dome highlight -->
  <path d="M120,220 A136,136 0 0,1 392,220" fill="none" stroke="#e0b189" stroke-width="6" opacity="0.25" />

</svg>