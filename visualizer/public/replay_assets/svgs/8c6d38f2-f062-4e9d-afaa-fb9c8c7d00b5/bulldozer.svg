<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <rect width='512' height='512' fill='#cfeeff'/>
  <rect y='360' width='512' height='152' fill='#e6cf9a'/>

  <!-- Tracks -->
  <rect x='40' y='310' width='432' height='92' rx='22' fill='#2a2a2a' />
  <rect x='60' y='328' width='392' height='56' rx='16' fill='#111' opacity='0.9'/>
  <!-- Road wheels -->
  <g fill='#6b6b6b' stroke='#222' stroke-width='4'>
    <circle cx='100' cy='356' r='24'/>
    <circle cx='188' cy='356' r='24'/>
    <circle cx='276' cy='356' r='24'/>
    <circle cx='364' cy='356' r='24'/>
    <circle cx='452' cy='356' r='24'/>
  </g>
  <g fill='#222' opacity='0.7'>
    <circle cx='100' cy='356' r='12'/>
    <circle cx='188' cy='356' r='12'/>
    <circle cx='276' cy='356' r='12'/>
    <circle cx='364' cy='356' r='12'/>
    <circle cx='452' cy='356' r='12'/>
  </g>

  <!-- Body -->
  <rect x='180' y='170' width='220' height='120' rx='12' fill='#f2c400' stroke='#b78f00' stroke-width='4'/>
  <!-- Cabin window -->
  <rect x='200' y='186' width='100' height='74' rx='8' fill='#bfeeff' opacity='0.95' stroke='#7fbfd4' stroke-width='3'/>
  <!-- Roof -->
  <rect x='210' y='150' width='120' height='28' rx='6' fill='#d9a800' stroke='#b78f00' stroke-width='3'/>

  <!-- Engine hood -->
  <path d='M180 190 L140 230 L180 270 L180 190' fill='#f2c400' stroke='#b78f00' stroke-width='4'/>

  <!-- Blade arm -->
  <rect x='150' y='220' width='22' height='90' rx='6' fill='#7a7a7a' transform='rotate(-30 161 265)'/>
  <rect x='170' y='230' width='18' height='82' rx='6' fill='#6a6a6a' transform='rotate(-30 179 271)'/>

  <!-- Blade -->
  <polygon points='40,260 140,230 170,270 60,300' fill='#ffb000' stroke='#8a5c00' stroke-width='6'/>
  <rect x='50' y='270' width='100' height='22' rx='6' fill='#ffbf66' opacity='0.7'/>

  <!-- Small details -->
  <rect x='320' y='200' width='18' height='34' rx='4' fill='#333'/>
  <rect x='300' y='200' width='8' height='34' rx='3' fill='#555' opacity='0.7'/>

</svg>