<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#f3f6fb" />

  <!-- Laptop screen -->
  <rect x="56" y="110" width="400" height="240" rx="14" fill="#ffffff" stroke="#cfd8e7" stroke-width="2" />
  <rect x="76" y="130" width="360" height="200" rx="10" fill="#0f1724" />

  <!-- code-like colored bars (no text) -->
  <g fill="#6ee7b7">
    <rect x="96" y="150" width="220" height="14" rx="7" />
    <rect x="96" y="174" width="280" height="14" rx="7" fill="#f6c85f" />
    <rect x="96" y="198" width="160" height="14" rx="7" fill="#8fb3ff" />
    <rect x="96" y="222" width="320" height="14" rx="7" fill="#c38cff" />
    <rect x="96" y="246" width="120" height="14" rx="7" fill="#ff9aa2" />
  </g>

  <!-- small squares indicating UI elements -->
  <g fill="#1f2937">
    <rect x="300" y="150" width="18" height="18" rx="4" fill="#0ea5a4" />
    <rect x="322" y="150" width="18" height="18" rx="4" fill="#fb923c" />
    <rect x="344" y="150" width="18" height="18" rx="4" fill="#60a5fa" />
  </g>

  <!-- Laptop base / keyboard -->
  <rect x="40" y="362" width="432" height="48" rx="10" fill="#e6ebf5" stroke="#cfd8e7" stroke-width="2" />
  <rect x="212" y="372" width="88" height="26" rx="8" fill="#d9e1f0" />

  <!-- Track of laptop (thin shadow) -->
  <rect x="32" y="412" width="448" height="12" rx="6" fill="#e9eef8" />

  <!-- Gear (tools) overlapping screen -->
  <g>
    <!-- gear teeth using rotated rectangles around center 360,112 -->
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(0 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(45 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(90 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(135 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(180 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(225 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(270 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <rect x="352" y="88" width="16" height="28" rx="3" transform="rotate(315 360 102)" fill="#f6c85f" stroke="#d6a94a" stroke-width="1" />
    <circle cx="360" cy="102" r="18" fill="#ffdd7a" stroke="#d6a94a" stroke-width="2" />
    <circle cx="360" cy="102" r="7" fill="#fbf7ef" />
  </g>

  <!-- Network/graph nodes on left of screen -->
  <g stroke="#1f2937" stroke-width="6" stroke-linecap="round">
    <line x1="140" y1="180" x2="100" y2="240" stroke="#94a3b8" />
    <line x1="140" y1="180" x2="180" y2="240" stroke="#94a3b8" />
  </g>
  <g fill="#fff">
    <circle cx="140" cy="180" r="14" fill="#60a5fa" stroke="#274472" stroke-width="3" />
    <circle cx="100" cy="240" r="12" fill="#34d399" stroke="#1b6b4a" stroke-width="3" />
    <circle cx="180" cy="240" r="12" fill="#f6c85f" stroke="#a97b39" stroke-width="3" />
  </g>

  <!-- Coffee cup to the right of laptop -->
  <g>
    <rect x="408" y="372" width="64" height="48" rx="8" fill="#ffffff" stroke="#c1c9d9" stroke-width="2" />
    <path d="M472 384 a16 16 0 0 0 0 28" fill="none" stroke="#c1c9d9" stroke-width="6" stroke-linecap="round" />
    <rect x="420" y="364" width="40" height="16" rx="6" fill="#fb923c" />
    <!-- steam -->
    <path d="M434 348 q4 -14 10 0" fill="none" stroke="#d9dce6" stroke-width="4" stroke-linecap="round" />
    <path d="M446 344 q4 -18 10 0" fill="none" stroke="#e6e9ef" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- subtle reflection on screen -->
  <path d="M76 130 q120 -12 240 0" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="40" stroke-linecap="round" />

</svg>