<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#120214" />

  <!-- Moon -->
  <circle cx="110" cy="100" r="70" fill="#f6e9b7" opacity="0.95" />

  <!-- Small bat silhouette (simple) -->
  <path d="M360 80 C340 60, 300 60, 280 80 C260 60, 220 60, 200 80 C225 70, 245 85, 256 88 C267 85, 287 70, 312 80 C330 70, 350 80, 360 80 Z" fill="#0b0b0b" />

  <!-- Cape wings behind head -->
  <path d="M256 200 C360 210, 430 320, 390 420 C350 480, 200 500, 120 420 C70 340, 150 220, 256 200 Z" fill="#2b0510" />
  <path d="M256 210 C340 220, 390 320, 360 400 C330 460, 210 470, 150 400 C120 330, 170 240, 256 210 Z" fill="#4a0b14" opacity="0.9" />

  <!-- Neck and collar -->
  <path d="M200 245 L312 245 L296 300 L216 300 Z" fill="#0b0b0b" />
  <path d="M220 240 L292 240 L276 260 L232 260 Z" fill="#3b0a0f" />

  <!-- Head shape -->
  <ellipse cx="256" cy="170" rx="92" ry="112" fill="#f6eef0" />

  <!-- Hair & widow's peak -->
  <path d="M180 130 C190 90, 230 70, 256 90 C282 70, 322 90, 332 130 C310 115, 300 120, 256 110 C212 120, 202 115, 180 130 Z" fill="#0b0b0b" />
  <path d="M180 130 C190 150, 210 160, 256 150 C302 160, 322 150, 332 130" fill="#0b0b0b" opacity="0.9" />

  <!-- Pointed ears -->
  <path d="M180 170 L150 150 L170 195 Z" fill="#0b0b0b" />
  <path d="M332 170 L362 150 L342 195 Z" fill="#0b0b0b" />

  <!-- Eyes -->
  <ellipse cx="228" cy="160" rx="16" ry="10" fill="#0b0b0b" />
  <ellipse cx="284" cy="160" rx="16" ry="10" fill="#0b0b0b" />
  <circle cx="228" cy="160" r="6" fill="#b31217" />
  <circle cx="284" cy="160" r="6" fill="#b31217" />
  <!-- narrow pupils (vertical) -->
  <rect x="224" y="154" width="8" height="12" rx="2" fill="#0b0b0b" />
  <rect x="280" y="154" width="8" height="12" rx="2" fill="#0b0b0b" />

  <!-- Nose (subtle) -->
  <path d="M256 178 C250 190, 262 190, 256 178 Z" fill="#e6d7d8" />

  <!-- Mouth and fangs -->
  <ellipse cx="256" cy="200" rx="34" ry="18" fill="#0b0b0b" />
  <!-- Fangs -->
  <path d="M238 190 L246 236 L250 190 Z" fill="#ffffff" />
  <path d="M276 190 L268 236 L264 190 Z" fill="#ffffff" />

  <!-- Small blood drop near fang -->
  <path d="M252 242 C254 246, 258 246, 260 242 C262 238, 258 232, 256 236 C254 232, 248 238, 252 242 Z" fill="#b30d0d" />

  <!-- Subtle cheek shadows -->
  <ellipse cx="210" cy="190" rx="12" ry="20" fill="#e7dfe0" opacity="0.6" />
  <ellipse cx="302" cy="190" rx="12" ry="20" fill="#e7dfe0" opacity="0.6" />

</svg>