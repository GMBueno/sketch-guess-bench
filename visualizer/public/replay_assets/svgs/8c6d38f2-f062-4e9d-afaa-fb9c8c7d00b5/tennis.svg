<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#2e8b57" />

  <!-- Court area -->
  <rect x="56" y="56" width="400" height="400" rx="8" fill="#3CB371" stroke="#ffffff" stroke-width="8" />

  <!-- Net across center -->
  <g transform="translate(56,256)">
    <rect x="0" y="-6" width="400" height="12" fill="#ffffff" opacity="0.95" />
    <!-- net vertical threads -->
    <g stroke="#2b2b2b" stroke-width="2" opacity="0.6">
      <!-- draw many thin vertical lines to suggest net mesh -->
      <!-- lines spaced 12px -->
      <g>
        <line x1="6" y1="-36" x2="6" y2="36" />
        <line x1="18" y1="-36" x2="18" y2="36" />
        <line x1="30" y1="-36" x2="30" y2="36" />
        <line x1="42" y1="-36" x2="42" y2="36" />
        <line x1="54" y1="-36" x2="54" y2="36" />
        <line x1="66" y1="-36" x2="66" y2="36" />
        <line x1="78" y1="-36" x2="78" y2="36" />
        <line x1="90" y1="-36" x2="90" y2="36" />
        <line x1="102" y1="-36" x2="102" y2="36" />
        <line x1="114" y1="-36" x2="114" y2="36" />
        <line x1="126" y1="-36" x2="126" y2="36" />
        <line x1="138" y1="-36" x2="138" y2="36" />
        <line x1="150" y1="-36" x2="150" y2="36" />
        <line x1="162" y1="-36" x2="162" y2="36" />
        <line x1="174" y1="-36" x2="174" y2="36" />
        <line x1="186" y1="-36" x2="186" y2="36" />
        <line x1="198" y1="-36" x2="198" y2="36" />
        <line x1="210" y1="-36" x2="210" y2="36" />
        <line x1="222" y1="-36" x2="222" y2="36" />
        <line x1="234" y1="-36" x2="234" y2="36" />
        <line x1="246" y1="-36" x2="246" y2="36" />
        <line x1="258" y1="-36" x2="258" y2="36" />
        <line x1="270" y1="-36" x2="270" y2="36" />
        <line x1="282" y1="-36" x2="282" y2="36" />
        <line x1="294" y1="-36" x2="294" y2="36" />
        <line x1="306" y1="-36" x2="306" y2="36" />
        <line x1="318" y1="-36" x2="318" y2="36" />
        <line x1="330" y1="-36" x2="330" y2="36" />
        <line x1="342" y1="-36" x2="342" y2="36" />
        <line x1="354" y1="-36" x2="354" y2="36" />
        <line x1="366" y1="-36" x2="366" y2="36" />
        <line x1="378" y1="-36" x2="378" y2="36" />
        <line x1="390" y1="-36" x2="390" y2="36" />
      </g>
    </g>
  </g>

  <!-- Tennis racket (right side) -->
  <!-- frame -->
  <ellipse cx="360" cy="160" rx="60" ry="85" fill="#f6e9d6" stroke="#5c2d00" stroke-width="10" />
  <!-- inner thin rim to suggest frame thickness -->
  <ellipse cx="360" cy="160" rx="50" ry="73" fill="none" stroke="#8b5a2b" stroke-width="6" />

  <!-- clip path for strings to stay inside head -->
  <defs>
    <clipPath id="racketClip">
      <ellipse cx="360" cy="160" rx="50" ry="73" />
    </clipPath>
  </defs>

  <!-- strings: vertical and horizontal grid clipped to racket head -->
  <g clip-path="url(#racketClip)" stroke="#cfcfcf" stroke-width="2" stroke-linecap="round">
    <!-- vertical strings -->
    <g>
      <line x1="300" y1="87" x2="300" y2="233" />
      <line x1="312" y1="82" x2="312" y2="238" />
      <line x1="324" y1="78" x2="324" y2="242" />
      <line x1="336" y1="76" x2="336" y2="244" />
      <line x1="348" y1="76" x2="348" y2="244" />
      <line x1="360" y1="76" x2="360" y2="244" />
      <line x1="372" y1="76" x2="372" y2="244" />
      <line x1="384" y1="78" x2="384" y2="242" />
      <line x1="396" y1="82" x2="396" y2="238" />
      <line x1="408" y1="87" x2="408" y2="233" />
    </g>
    <!-- horizontal strings -->
    <g>
      <line x1="265" y1="100" x2="455" y2="100" />
      <line x1="268" y1="112" x2="452" y2="112" />
      <line x1="272" y1="124" x2="448" y2="124" />
      <line x1="276" y1="136" x2="444" y2="136" />
      <line x1="280" y1="148" x2="440" y2="148" />
      <line x1="284" y1="160" x2="436" y2="160" />
      <line x1="280" y1="172" x2="440" y2="172" />
      <line x1="276" y1="184" x2="444" y2="184" />
      <line x1="272" y1="196" x2="448" y2="196" />
      <line x1="268" y1="208" x2="452" y2="208" />
      <line x1="265" y1="220" x2="455" y2="220" />
    </g>
  </g>

  <!-- handle -->
  <g>
    <rect x="344" y="232" width="32" height="110" rx="8" fill="#8b5a2b" stroke="#5c2d00" stroke-width="4" />
    <!-- grip bands -->
    <g stroke="#eaeaea" stroke-width="3">
      <line x1="346" y1="248" x2="372" y2="256" />
      <line x1="346" y1="270" x2="372" y2="278" />
      <line x1="346" y1="292" x2="372" y2="300" />
      <line x1="346" y1="314" x2="372" y2="322" />
      <line x1="346" y1="336" x2="372" y2="344" />
      <line x1="346" y1="358" x2="372" y2="366" />
    </g>
  </g>

  <!-- Tennis ball (left) -->
  <g>
    <circle cx="180" cy="210" r="28" fill="#FFD400" stroke="#d9b800" stroke-width="4" />
    <!-- seams -->
    <path d="M155 190 C170 185, 190 185, 205 190" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <path d="M155 230 C170 235, 190 235, 205 230" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <!-- slight shadow -->
    <ellipse cx="170" cy="220" rx="12" ry="6" fill="#000" opacity="0.08" />
  </g>

</svg>