<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fff9b0"/>
      <stop offset="60%" stop-color="#ffae33"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- space background -->
  <rect width="512" height="512" fill="#050217" />

  <!-- distant stars -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="40" cy="36" r="1.2" opacity="0.9"/>
    <circle cx="92" cy="78" r="1.6" opacity="0.7"/>
    <circle cx="130" cy="34" r="1" opacity="0.8"/>
    <circle cx="210" cy="90" r="1.1" opacity="0.7"/>
    <circle cx="320" cy="48" r="1.3" opacity="0.8"/>
    <circle cx="472" cy="60" r="1.0" opacity="0.6"/>
    <circle cx="420" cy="150" r="1.4" opacity="0.7"/>
    <circle cx="280" cy="20" r="1.0" opacity="0.8"/>
    <circle cx="190" cy="200" r="1.2" opacity="0.6"/>
    <circle cx="460" cy="420" r="1.1" opacity="0.5"/>
    <circle cx="60" cy="430" r="1.3" opacity="0.6"/>
    <circle cx="350" cy="300" r="1.0" opacity="0.7"/>
  </g>

  <!-- explosion spikes (repeated rotated triangles) -->
  <g opacity="0.95">
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffd97a"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffb24a" opacity="0.9" transform="rotate(30 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffb24a" opacity="0.85" transform="rotate(60 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ff8a1a" opacity="0.8" transform="rotate(90 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffb24a" opacity="0.85" transform="rotate(120 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffd97a" opacity="0.8" transform="rotate(150 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffd97a" opacity="0.9" transform="rotate(180 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffb24a" opacity="0.9" transform="rotate(210 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffb24a" opacity="0.85" transform="rotate(240 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ff8a1a" opacity="0.8" transform="rotate(270 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffb24a" opacity="0.85" transform="rotate(300 256 256)"/>
    <path d="M256 256 L266 76 L246 76 Z" fill="#ffd97a" opacity="0.8" transform="rotate(330 256 256)"/>

    <!-- shorter inner spikes -->
    <path d="M256 256 L266 120 L246 120 Z" fill="#fff2c6" opacity="0.9"/>
    <path d="M256 256 L266 120 L246 120 Z" fill="#fff2c6" opacity="0.9" transform="rotate(45 256 256)"/>
    <path d="M256 256 L266 120 L246 120 Z" fill="#fff2c6" opacity="0.9" transform="rotate(135 256 256)"/>
    <path d="M256 256 L266 120 L246 120 Z" fill="#fff2c6" opacity="0.9" transform="rotate(225 256 256)"/>
  </g>

  <!-- glowing shockwave rings -->
  <g filter="url(#softBlur)" opacity="0.85">
    <circle cx="256" cy="256" r="90" fill="none" stroke="#ffd99a" stroke-width="10" stroke-opacity="0.45"/>
    <circle cx="256" cy="256" r="140" fill="none" stroke="#ff8a33" stroke-width="14" stroke-opacity="0.35"/>
    <circle cx="256" cy="256" r="210" fill="none" stroke="#ff4d00" stroke-width="20" stroke-opacity="0.2"/>
  </g>

  <!-- central bright core -->
  <circle cx="256" cy="256" r="64" fill="url(#coreGrad)" />
  <circle cx="256" cy="256" r="18" fill="#ffffff" opacity="1"/>

  <!-- ejected debris particles -->
  <g>
    <circle cx="340" cy="160" r="4" fill="#ffcf8a" opacity="0.95"/>
    <circle cx="380" cy="200" r="3" fill="#ff9b4a" opacity="0.9"/>
    <circle cx="430" cy="230" r="2.5" fill="#fff6d8" opacity="0.9"/>
    <circle cx="300" cy="320" r="3.5" fill="#ffc77a" opacity="0.9"/>
    <circle cx="210" cy="380" r="2.8" fill="#ffd99a" opacity="0.85"/>
    <circle cx="140" cy="300" r="3" fill="#ffcc88" opacity="0.9"/>
    <circle cx="110" cy="200" r="2.2" fill="#fff5d6" opacity="0.8"/>
    <circle cx="180" cy="120" r="2.6" fill="#ffb86a" opacity="0.88"/>
    <circle cx="420" cy="340" r="2.4" fill="#ff9d4f" opacity="0.8"/>
  </g>

</svg>