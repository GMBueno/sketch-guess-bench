<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Main Body -->
  <rect x="150" y="220" width="200" height="120" fill="#FFD700" stroke="#000" stroke-width="4" />
  <!-- Cabin -->
  <rect x="220" y="150" width="100" height="70" fill="#FFD700" stroke="#000" stroke-width="4" />
  <rect x="235" y="160" width="70" height="40" fill="#ADD8E6" stroke="#000" stroke-width="2" />
  <!-- Exhaust Pipe -->
  <rect x="180" y="170" width="15" height="50" fill="#333" />
  <!-- Tracks (Wheels) -->
  <rect x="130" y="340" width="240" height="60" rx="30" fill="#333" />
  <circle cx="160" cy="370" r="20" fill="#666" />
  <circle cx="250" cy="370" r="20" fill="#666" />
  <circle cx="340" cy="370" r="20" fill="#666" />
  <!-- Arm/Piston -->
  <line x1="150" y1="300" x2="80" y2="300" stroke="#666" stroke-width="12" />
  <!-- Blade (The Dozer) -->
  <path d="M80 240 Q40 300 80 360 L100 360 L100 240 Z" fill="#999" stroke="#000" stroke-width="4" />
</svg>