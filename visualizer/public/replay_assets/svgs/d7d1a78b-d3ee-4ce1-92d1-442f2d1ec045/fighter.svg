<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Ground shadow -->
  <ellipse cx="290" cy="420" rx="150" ry="22" fill="#000" opacity="0.15"/>

  <!-- Fighter jet body -->
  <g fill="none" stroke="#1f2a44" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tail fin -->
    <path d="M168 295 L120 248 L148 240 L178 265 Z" fill="#3b4b6b"/>

    <!-- Main fuselage -->
    <path d="M180 280
             C205 270, 240 256, 275 252
             C318 248, 360 258, 392 274
             C416 286, 439 304, 450 318
             C440 334, 418 351, 392 363
             C360 379, 318 389, 275 385
             C240 381, 205 367, 180 355
             C168 348, 160 337, 160 318
             C160 300, 168 288, 180 280 Z" fill="#2b3a5a"/>

    <!-- Canopy / cockpit -->
    <path d="M255 292
             C283 284, 320 287, 348 301
             C336 318, 316 333, 292 341
             C273 333, 258 318, 255 292 Z" fill="#7aa7ff" stroke="#1f2a44"/>

    <!-- Nose cone -->
    <path d="M160 318 L88 320 C106 300, 126 282, 150 270
             C160 285, 165 300, 160 318 Z" fill="#22314f"/>

    <!-- Wings -->
    <path d="M258 270 C232 262, 202 257, 175 260
             C198 282, 220 303, 240 315
             C248 302, 252 286, 258 270 Z" fill="#2f4168"/>
    <path d="M258 366 C236 362, 210 352, 182 336
             C206 360, 226 382, 246 399
             C252 386, 256 377, 258 366 Z" fill="#2f4168"/>

    <!-- Contrails/energy lines (imply action) -->
    <path d="M120 340 C160 320, 210 310, 280 310" stroke="#7aa7ff" opacity="0.9" stroke-width="5"/>
    <path d="M110 365 C160 345, 220 335, 295 335" stroke="#7aa7ff" opacity="0.55" stroke-width="4"/>

    <!-- Landing gear hints -->
    <path d="M206 332 C214 345, 228 358, 242 364" stroke="#1f2a44" opacity="0.75"/>
    <path d="M305 337 C295 352, 280 364, 268 368" stroke="#1f2a44" opacity="0.75"/>
  </g>

  <!-- Spark/impact points near nose -->
  <g>
    <circle cx="95" cy="315" r="4" fill="#9ff0ff"/>
    <circle cx="110" cy="323" r="3" fill="#9ff0ff" opacity="0.9"/>
    <circle cx="102" cy="335" r="2.5" fill="#9ff0ff" opacity="0.8"/>
  </g>
</svg>