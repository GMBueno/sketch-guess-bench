<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="fire">
  <rect width="512" height="512" fill="#0b0b12"/>

  <!-- soft glow -->
  <ellipse cx="256" cy="320" rx="120" ry="90" fill="#ff7a18" opacity="0.18"/>
  <ellipse cx="256" cy="330" rx="85" ry="65" fill="#ffd166" opacity="0.18"/>

  <!-- flame (outer) -->
  <path d="M256 118
           C234 155, 195 192, 195 240
           C195 278, 214 295, 214 318
           C214 360, 242 392, 256 402
           C270 392, 298 360, 298 318
           C298 295, 317 278, 317 240
