           C243 196, 222 218, 222 250
           C222 277, 237 291, 237 310
           C237 345, 252 366, 256 372
           C260 366, 275 345, 275 310
           C275 291, 290 277, 290 250
           C290 218, 269 196, 256 170 Z"
