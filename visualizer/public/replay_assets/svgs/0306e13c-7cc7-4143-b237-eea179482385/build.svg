<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="100%" height="100%" fill="#e9f5ff"/>
  <!-- ground -->
  <rect y="420" width="512" height="92" fill="#d9d9d9"/>
  <ellipse cx="260" cy="468" rx="220" ry="18" fill="#cfcfcf" opacity="0.5"/>

  <!-- Brick wall -->
  <g id="wall">
    <!-- draw bricks: 6 columns x 6 rows -->
    <!-- brick style: width 44, height 28, horizontal gap 6, vertical gap 6 -->
    <!-- starting at (80,180) -->
    <!-- row 0 -->
    <rect x="80" y="180" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="130" y="180" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="180" y="180" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="230" y="180" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="280" y="180" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="330" y="180" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <!-- row 1 -->
    <rect x="80" y="214" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="130" y="214" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="180" y="214" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="230" y="214" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="280" y="214" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="330" y="214" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <!-- row 2 -->
    <rect x="80" y="248" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="130" y="248" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="180" y="248" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="230" y="248" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="280" y="248" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="330" y="248" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <!-- row 3 -->
    <rect x="80" y="282" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="130" y="282" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="180" y="282" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="230" y="282" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="280" y="282" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="330" y="282" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <!-- row 4 -->
    <rect x="80" y="316" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="130" y="316" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="180" y="316" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="230" y="316" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="280" y="316" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="330" y="316" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <!-- row 5 -->
    <rect x="80" y="350" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="130" y="350" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="180" y="350" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="230" y="350" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="280" y="350" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
    <rect x="330" y="350" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
  </g>

  <!-- small scaffold on wall -->
  <g fill="#7a5a3a" opacity="0.9">
    <rect x="70" y="160" width="8" height="220"/>
    <rect x="368" y="160" width="8" height="220"/>
    <rect x="70" y="220" width="300" height="8"/>
    <rect x="70" y="280" width="300" height="8"/>
  </g>

  <!-- Crane -->
  <g id="crane">
    <!-- mast -->
    <rect x="372" y="60" width="18" height="320" fill="#2f2f2f" rx="3"/>
    <!-- arm -->
    <rect x="220" y="64" width="170" height="14" fill="#2f2f2f" rx="3"/>
    <!-- bracing lines -->
    <line x1="230" y1="74" x2="372" y2="74" stroke="#222" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="260" y1="74" x2="372" y2="380" stroke="#222" stroke-width="2" opacity="0.15"/>
    <!-- cable -->
    <line x1="270" y1="78" x2="270" y2="150" stroke="#222" stroke-width="3"/>
    <!-- hook -->
    <path d="M270 150 q6 10 0 20 q-6 10 -0 20" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <path d="M266 190 q4 6 8 0" fill="#333"/>
    <!-- suspended brick -->
    <rect x="246" y="170" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
  </g>

  <!-- Hammer leaning against wall -->
  <g transform="translate(40,380) rotate(-22)">
    <rect x="0" y="0" width="120" height="12" rx="6" fill="#a05d3c"/>
    <rect x="10" y="-10" width="18" height="34" rx="3" fill="#3b3b3b"/>
    <rect x="95" y="-6" width="18" height="18" rx="3" fill="#3b3b3b" transform="rotate(12 104 3)"/>
  </g>

  <!-- small stack of bricks (built pieces) -->
  <g>
    <rect x="400" y="356" width="44" height="28" fill="#d66f3f" stroke="#8b3e26" stroke-width="2"/>
    <rect x="448" y="356" width="44" height="28" fill="#e07a46" stroke="#8b3e26" stroke-width="2"/>
    <rect x="424" y="322" width="44" height="28" fill="#c85" stroke="#8b3e26" stroke-width="2"/>
  </g>

  <!-- subtle details -->
  <g opacity="0.12" fill="#fff">
    <rect x="220" y="66" width="30" height="6"/>
    <rect x="260" y="66" width="18" height="6"/>
  </g>
</svg>