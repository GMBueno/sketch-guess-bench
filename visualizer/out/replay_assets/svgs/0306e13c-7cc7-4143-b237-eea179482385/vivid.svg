<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">\n  <defs>\n    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">\n      <stop offset="0" stop-color="#0f172a"/>\n      <stop offset="1" stop-color="#3b0f6f"/>\n    </linearGradient>\n    <radialGradient id="g1" cx="30%" cy="30%" r="50%">\n      <stop offset="0" stop-color="#ff3b81" stop-opacity="1"/>\n      <stop offset="1" stop-color="#ff3b81" stop-opacity="0.6"/>\n    </radialGradient>\n    <radialGradient id="g2" cx="70%" cy="35%" r="50%">\n      <stop offset="0" stop-color="#00f0ff" stop-opacity="1"/>\n      <stop offset="1" stop-color="#00f0ff" stop-opacity="0.6"/>\n    </radialGradient>\n    <radialGradient id="g3" cx="60%" cy="70%" r="50%">\n      <stop offset="0" stop-color="#ffd400" stop-opacity="1"/>\n      <stop offset="1" stop-color="#ffd400" stop-opacity="0.6"/>\n    </radialGradient>\n    <radialGradient id="g4" cx="25%" cy="70%" r="50%">\n      <stop offset="0" stop-color="#66ff66" stop-opacity="1"/>\n      <stop offset="1" stop-color="#66ff66" stop-opacity="0.6"/>\n    </radialGradient>\n    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">\n      <feGaussianBlur stdDeviation="18" result="b"/>\n      <feBlend in="SourceGraphic" in2="b" mode="screen"/>\n    </filter>\n    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">\n      <feGaussianBlur stdDeviation="8" result="g"/>\n      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>\n    </filter>\n  </defs>\n  <rect width="100%" height="100%" fill="url(#bg)"/>\n  <g filter="url(#soft)" opacity="0.95">\n    <ellipse cx="160" cy="150" rx="120" ry="90" fill="url(#g1)"/>\n    <ellipse cx="360" cy="140" rx="120" ry="100" fill="url(#g2)"/>\n    <ellipse cx="340" cy="350" rx="140" ry="110" fill="url(#g3)"/>\n    <ellipse cx="150" cy="370" rx="110" ry="100" fill="url(#g4)"/>\n  </g>\n  <g filter="url(#glow)" opacity="0.95">\n    <path d="M40 420 C140 320, 220 300, 300 220" stroke="#ff2d7a" stroke-width="18" stroke-linecap="round" fill="none" stroke-linejoin="round" opacity="0.9"/>\n    <path d="M60 380 C160 280, 240 260, 340 180" stroke="#00f0ff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9"/>\n    <path d="M120 460 C200 360, 280 340, 420 260" stroke="#ffd400" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9"/>\n    <path d="M30 300 C120 220, 200 200, 320 140" stroke="#66ff66" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.85"/>\n  </g>\n  <g transform="translate(256,256)">\n    <g>\n      <circle r="60" fill="white" opacity="0.08"/>\n      <circle r="40" fill="#ffffff" opacity="0.06"/>\n    </g>\n    <g>\n      <g fill-opacity="0.95">\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#ff3b81" transform="rotate(0)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#00f0ff" transform="rotate(30)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#ffd400" transform="rotate(60)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#66ff66" transform="rotate(90)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#ff7a00" transform="rotate(120)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#8a2be2" transform="rotate(150)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#ff3b81" transform="rotate(180)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#00f0ff" transform="rotate(210)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#ffd400" transform="rotate(240)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#66ff66" transform="rotate(270)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#ff7a00" transform="rotate(300)"/>\n        <path d="M0 -120 L12 -28 L-12 -28 Z" fill="#8a2be2" transform="rotate(330)"/>\n      </g>\n    </g>\n  </g>\n  <g fill="#ffffff" opacity="0.9">\n    <circle cx="420" cy="90" r="4"/>\n    <circle cx="460" cy="140" r="3.5"/>\n    <circle cx="100" cy="90" r="5"/>\n    <circle cx="60" cy="150" r="3"/>\n    <c