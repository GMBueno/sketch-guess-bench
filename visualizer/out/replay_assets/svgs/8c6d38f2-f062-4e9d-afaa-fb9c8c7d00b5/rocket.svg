<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"> <rect width="512" height="512" fill="#081226"/> <g fill="#fff" opacity="0.9"> <circle cx="50" cy="40" r="2" fill="#ffd" opacity="0.9"/> <circle cx="120" cy="80" r="1.6" fill="#fff" opacity="0.8"/> <circle cx="420" cy="60" r="1.8" fill="#fff" opacity="0.85"/> <circle cx="360" cy="140" r="1.4" fill="#fff" opacity="0.8"/> <circle cx="260" cy="30" r="1.7" fill="#fff" opacity="0.85"/> <circle cx="480" cy="220" r="1.2" fill="#fff" opacity="0.75"/> <circle cx="90" cy="200" r="1.3" fill="#fff" opacity="0.75"/> <circle cx="300" cy="100" r="1.6" fill="#fff" opacity="0.85"/> <circle cx="200" cy="60" r="1.2" fill="#fff" opacity="0.7"/> </g> <defs> <linearGradient id="bodyGrad" x1="0" x2="0" y1="0" y2="1"> <stop offset="0%" stop-color="#ff6b6b"/> <stop offset="60%" stop-color="#ff3b3b"/> <stop offset="100%" stop-color="#c21f1f"/> </linearGradient> <linearGradient id="noseShine" x1="0" x2="1"> <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/> <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/> </linearGradient> <linearGradient id="windowGrad" x1="0" x2="0" y1="0" y2="1"> <stop offset="0%" stop-color="#aee6ff"/> <stop offset="100%" stop-color="#4aaef7"/> </linearGradient> <linearGradient id="flameGrad" x1="0" x2="0" y1="0" y2="1"> <stop offset="0%" stop-color="#fff47a"/> <stop offset="40%" stop-color="#ffb84d"/> <stop offset="100%" stop-color="#ff4b3a"/> </linearGradient> </defs> <g transform="translate(256,240)"> <!-- rocket body --> <rect x="-40" y="-120" width="80" height="200" rx="40" fill="url(#bodyGrad)" stroke="#8b1b1b" stroke-width="2"/> <!-- nose cone --> <path d="M -40 -120 Q 0 -170 40 -120 Z" fill="#3b3b3b"/> <path d="M -40 -120 Q 0 -160 40 -120 Z" fill="url(#noseShine)" opacity="0.25"/> <!-- window --> <circle cx="0" cy="-20" r="20" fill="url(#windowGrad)" stroke="#d6f3ff" stroke-width="3"/> <circle cx="-6" cy="-26" r="6" fill="#ffffff" opacity="0.6"/> <!-- fins --