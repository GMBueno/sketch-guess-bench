<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#07243a" />
      <path d="M32 0 L0 0 0 32" fill="none" stroke="#083b53" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#07243a" />
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.45" />

  <!-- Gears group -->
  <g stroke="#d7f3ff" stroke-width="3" fill="#86c0db" opacity="0.98">
    <!-- Gear 1 (left) -->
    <g>
      <circle cx="170" cy="320" r="40" fill="#478fb0" />
      <circle cx="170" cy="320" r="14" fill="#07243a" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(0 170 320)" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(45 170 320)" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(90 170 320)" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(135 170 320)" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(180 170 320)" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(225 170 320)" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(270 170 320)" />
      <rect x="164" y="262" width="12" height="18" rx="3" transform="rotate(315 170 320)" />
    </g>

    <!-- Gear 2 (center-top) -->
    <g>
      <circle cx="300" cy="220" r="50" fill="#5aa0c9" />
      <circle cx="300" cy="220" r="16" fill="#07243a" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(0 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(36 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(72 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(108 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(144 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(180 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(216 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(252 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(288 300 220)" />
      <rect x="293" y="150" width="14" height="20" rx="3" transform="rotate(324 300 220)" />
    </g>

    <!-- Gear 3 (right) -->
    <g>
      <circle cx="380" cy="340" r="30" fill="#6ba8c5" />
      <circle cx="380" cy="340" r="10" fill="#07243a" />
      <rect x="375" y="294" width="10" height="16" rx="2" transform="rotate(0 380 340)" />
      <rect x="375" y="294" width="10" height="16" rx="2" transform="rotate(60 380 340)" />
      <rect x="375" y="294" width="10" height="16" rx="2" transform="rotate(120 380 340)" />
      <rect x="375" y="294" width="10" height="16" rx="2" transform="rotate(180 380 340)" />
      <rect x="375" y="294" width="10" height="16" rx="2" transform="rotate(240 380 340)" />
      <rect x="375" y="294" width="10" height="16" rx="2" transform="rotate(300 380 340)" />
    </g>
  </g>

  <!-- Wrench across gears -->
  <g fill="#77a6b8" stroke="#dff5ff" stroke-width="2" opacity="0.98">
    <rect x="80" y="110" width="360" height="26" rx="13" transform="rotate(-28 260 123)" />
    <circle cx="120" cy="90" r="26" fill="#7fb1c6" stroke="#dff5ff" stroke-width="3" transform="rotate(-28 120 90)" />
    <circle cx="132" cy="102" r="12" fill="#07243a" transform="rotate(-28 132 102)" />
  </g>

  <!-- Small bolts / details -->
  <g fill="#cdeaf9" stroke="#07243a" stroke-width="1">
    <circle cx="250" cy="240" r="6" />
    <circle cx="200" cy="300" r="5" />
    <circle cx="340" cy="280" r="4" />
  </g>

</svg>