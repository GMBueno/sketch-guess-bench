<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="100%" height="100%" fill="#f5efe6"/>

  <!-- Saucer -->
  <ellipse cx="256" cy="370" rx="180" ry="28" fill="#e6d6b8" stroke="#d0bfa0" stroke-width="4"/>

  <!-- Cup shadow on saucer -->
  <ellipse cx="256" cy="336" rx="110" ry="18" fill="#efe9e4" opacity="0.6"/>

  <!-- Cup body -->
  <rect x="156" y="260" width="200" height="140" rx="30" ry="30" fill="#ffffff" stroke="#d8d8d8" stroke-width="4"/>

  <!-- Coffee liquid -->
  <ellipse cx="256" cy="276" rx="100" ry="28" fill="#3e2316"/>
  <!-- small highlight on coffee -->
  <ellipse cx="210" cy="266" rx="28" ry="8" fill="#6b442f" opacity="0.18"/>

  <!-- Rim overlay to suggest thickness -->
  <ellipse cx="256" cy="276" rx="108" ry="30" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- Handle (back shadow then front highlight) -->
  <path d="M356 300 C408 300 408 344 356 344" stroke="#d6d6d6" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M356 300 C408 300 408 344 356 344" stroke="#ffffff" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Steam -->
  <path d="M240 220 C240 182 260 170 260 138" stroke="#ffffff" stroke-opacity="0.85" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M280 210 C280 175 300 165 300 132" stroke="#ffffff" stroke-opacity="0.8" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M310 230 C310 190 330 180 330 150" stroke="#ffffff" stroke-opacity="0.75" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Coffee beans on saucer -->
  <g transform="translate(110,410) rotate(-20)">
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="#47301f" stroke="#2f1f15" stroke-width="2"/>
    <path d="M-12 0 C-6 -6 6 -6 12 0" stroke="#2f1f15" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(80,380) rotate(-10)">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#55321f" stroke="#2f1f15" stroke-width="2"/>
    <path d="M-9 0 C-4 -5 4 -5 9 0" stroke="#2f1f15" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

</svg>