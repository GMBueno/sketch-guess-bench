<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#eef4fb"/>

  <!-- Monitor frame -->
  <rect x="48" y="64" width="416" height="320" rx="18" fill="#2b2f36" stroke="#1a1b1f" stroke-width="4"/>
  <!-- Screen -->
  <rect x="72" y="88" width="368" height="240" rx="8" fill="#071226"/>

  <!-- Code-like blocks (abstract, no text) -->
  <g fill="#64d9b0" opacity="0.95">
    <!-- Row 1 -->
    <rect x="88" y="108" rx="4" width="140" height="12" />
    <rect x="240" y="108" rx="4" width="80" height="12" />
    <rect x="336" y="108" rx="4" width="40" height="12" />
    <!-- Row 2 -->
    <rect x="88" y="130" rx="4" width="110" height="12" />
    <rect x="206" y="130" rx="4" width="140" height="12" />
    <!-- Row 3 -->
    <rect x="88" y="152" rx="4" width="180" height="12" />
    <rect x="280" y="152" rx="4" width="72" height="12" />
    <rect x="360" y="152" rx="4" width="56" height="12" />
    <!-- Row 4 -->
    <rect x="88" y="174" rx="4" width="140" height="12" />
    <rect x="240" y="174" rx="4" width="112" height="12" />
    <!-- Row 5 -->
    <rect x="88" y="196" rx="4" width="200" height="12" />
    <rect x="296" y="196" rx="4" width="64" height="12" />
    <!-- Row 6 -->
    <rect x="88" y="218" rx="4" width="160" height="12" />
    <rect x="260" y="218" rx="4" width="120" height="12" />
    <!-- Row 7 -->
    <rect x="88" y="240" rx="4" width="120" height="12" />
    <rect x="220" y="240" rx="4" width="100" height="12" />
    <rect x="332" y="240" rx="4" width="64" height="12" />
  </g>

  <!-- Gear symbol (represents software/settings) -->
  <g transform="translate(0,0)">
    <!-- gear teeth: 8 rectangles rotated around center -->
    <g fill="#f6b84b">
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(0 336 167)" />
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(45 336 167)" />
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(90 336 167)" />
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(135 336 167)" />
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(180 336 167)" />
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(225 336 167)" />
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(270 336 167)" />
      <rect x="330" y="154" width="12" height="26" rx="3" transform="rotate(315 336 167)" />
    </g>
    <!-- gear body -->
    <circle cx="336" cy="167" r="28" fill="#f59e3b" stroke="#d47e24" stroke-width="2"/>
    <!-- gear hole -->
    <circle cx="336" cy="167" r="10" fill="#071226"/>
  </g>

  <!-- Connection lines / nodes (abstract network) -->
  <g stroke="#64d9b0" stroke-width="3" stroke-linecap="round">
    <line x1="300" y1="200" x2="260" y2="230" />
    <line x1="360" y1="180" x2="400" y2="220" />
  </g>
  <circle cx="260" cy="230" r="6" fill="#64d9b0" stroke="#052232" stroke-width="1" />
  <circle cx="400" cy="220" r="6" fill="#64d9b0" stroke="#052232" stroke-width="1" />

  <!-- Mouse cursor (interaction) -->
  <polygon points="128,320 176,256 164,248 212,232 204,224 156,240 148,248" fill="#ffffff" stroke="#0b1020" stroke-width="6" stroke-linejoin="round" opacity="0.95"/>

  <!-- Stand and base -->
  <rect x="224" y="392" width="64" height="10" rx="5" fill="#14161a"/>
  <ellipse cx="256" cy="410" rx="120" ry="16" fill="#dce6f3" opacity="0.25"/>
</svg>