<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"> <defs> <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1"> <stop offset="0" stop-color="#bfe9ff"/> <stop offset="1" stop-color="#e6f7ff"/> </linearGradient> <clipPath id="domeClip"> <ellipse cx="256" cy="260" rx="150" ry="130"/> </clipPath> </defs> <rect width="512" height="512" fill="url(#sky)"/> <!-- ground snow --> <ellipse cx="256" cy="452" rx="420" ry="60" fill="#ffffff"/> <!-- igloo dome --> <ellipse cx="256" cy="260" rx="150" ry="130" fill="#ffffff" stroke="#cfeefb" stroke-width="4"/> <!-- subtle base shadow --> <ellipse cx="256" cy="330" rx="140" ry="22" fill="#f0fbff" opacity="0.8"/> <!-- block grid clipped to dome --> <g clip-path="url(#domeClip)" stroke="#cfeefb" stroke-width="6" stroke-linecap="butt"> <!-- horizontal seams --> <path d="M106 200 H406"/> <path d="M106 230 H406"/> <path d="M106 260 H406"/> <path d="M106 290 H406"/> <path d="M106 320 H406"/> <!-- vertical seams --> <path d="M130 150 V380"/> <path d="M170 150 V380"/> <path d="M210 150 V380"/> <path d="M250 150 V380"/> <path d="M290 150 V380"/> <path d="M330 150 V380"/> <path d="M370 150 V380"/> </g> <!-- entrance tunnel --> <g transform="translate(340,320)"> <ellipse cx="0" cy="28" rx="60" ry="48" fill="#ffffff" stroke="#cfeefb" stroke-width="4"/> <ellipse cx="0" cy="28" rx="44" ry="34" fill="#eaf6ff"/> <ellipse cx="6" cy="32" rx="28" ry="20" fill="#cfe6f5"/> <ellipse cx="10" cy="34" rx="14" ry="10" fill="#9fc4d6"/> </g> <!-- entrance opening (dark) --> <ellipse cx="328" cy="340" rx="18" ry="14" fill="#7aa3b7"/> <!-- highlight on dome --> <ellipse cx="200" cy="200" rx="34" ry="22" fill="#f7ffff" opacity="0.9"/> </svg>