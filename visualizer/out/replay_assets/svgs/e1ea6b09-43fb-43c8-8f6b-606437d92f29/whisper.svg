<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Head of the speaker -->
  <path d="M150 200 Q140 150 190 130 Q240 110 280 150 Q300 180 300 220 L300 350 Q300 380 270 380 L180 380 Q150 380 150 350 Z" fill="#f5cba7" stroke="#333" stroke-width="4" />
  <!-- Ear of the speaker -->
  <path d="M150 240 Q130 240 130 270 Q130 300 150 300" fill="none" stroke="#333" stroke-width="4" />
  <!-- Hand covering mouth -->
  <path d="M280 320 Q340 320 360 280 Q370 240 340 200 Q320 180 280 220" fill="#f5cba7" stroke="#333" stroke-width="4" />
  <!-- Fingers on the hand -->
  <line x1="330" y1="210" x2="300" y2="240" stroke="#333" stroke-width="2" />
  <line x1="345" y1="230" x2="310" y2="260" stroke="#333" stroke-width="2" />
  <line x1="350" y1="260" x2="315" y2="280" stroke="#333" stroke-width="2" />
  <!-- Eye (closed/squinting) -->
  <path d="M200 220 Q220 210 240 220" fill="none" stroke="#333" stroke-width="3" />
  <!-- Sound waves/breath lines indicating soft speech -->
  <path d="M380 240 Q400 230 420 240" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="5,5" />
  <path d="M390 270 Q410 260 430 270" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="5,5" />
  <path d="M385 210 Q405 200 425 210" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="5,5" />
</svg>