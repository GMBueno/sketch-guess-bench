<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Ground -->
  <rect x="50" y="450" width="412" height="20" fill="#555" />
  
  <!-- Building Base -->
  <rect x="100" y="300" width="120" height="150" fill="#888" stroke="#333" stroke-width="4" />
  <rect x="115" y="320" width="30" height="30" fill="#ADD8E6" />
  <rect x="175" y="320" width="30" height="30" fill="#ADD8E6" />
  <rect x="145" y="400" width="30" height="50" fill="#444" />

  <!-- Scaffolding -->
  <line x1="220" y1="450" x2="220" y2="150" stroke="#CC7722" stroke-width="6" />
  <line x1="320" y1="450" x2="320" y2="150" stroke="#CC7722" stroke-width="6" />
  <line x1="220" y1="180" x2="320" y2="180" stroke="#CC7722" stroke-width="4" />
  <line x1="220" y1="250" x2="320" y2="250" stroke="#CC7722" stroke-width="4" />
  <line x1="220" y1="320" x2="320" y2="320" stroke="#CC7722" stroke-width="4" />
  <line x1="220" y1="390" x2="320" y2="390" stroke="#CC7722" stroke-width="4" />
  <line x1="220" y1="180" x2="320" y2="250" stroke="#CC7722" stroke-width="2" />
  <line x1="320" y1="180" x2="220" y2="250" stroke="#CC7722" stroke-width="2" />

  <!-- Crane -->
  <rect x="380" y="100" width="20" height="350" fill="#FFD700" />
  <rect x="200" y="80" width="250" height="20" fill="#FFD700" />
  <line x1="250" y1="100" x2="250" y2="200" stroke="#333" stroke-width="2" />
  
  <!-- Brick being lifted -->
  <rect x="230" y="200" width="40" height="20" fill="#B22222" stroke="#000" stroke-width="1" />
</svg>