<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe4ff"/>
      <stop offset="100%" stop-color="#f5fbff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ad2a3"/>
      <stop offset="100%" stop-color="#2e8b6e"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Clouds -->
  <g opacity="0.9" fill="#ffffff">
    <ellipse cx="110" cy="120" rx="70" ry="35"/>
    <ellipse cx="165" cy="110" rx="45" ry="28"/>
    <ellipse cx="220" cy="128" rx="55" ry="30"/>
    <ellipse cx="350" cy="105" rx="65" ry="33"/>
    <ellipse cx="405" cy="118" rx="45" ry="26"/>
  </g>

  <!-- Floating island -->
  <g filter="url(#softShadow)">
    <path d="M115 360 C130 330, 175 315, 210 325 C240 290, 310 300, 325 345 C360 338, 410 362, 404 400 C392 450, 160 455, 115 420 C98 402, 95 380, 115 360 Z" fill="url(#ground)" stroke="#1e6f56" stroke-width="4"/>
    <!-- island top highlight -->
    <path d="M150 370 C165 350, 195 345, 220 352 C240 332, 290 332, 305 360 C335 356, 375 375, 368 405 C358 440, 190 440, 155 415 C140 403, 138 386, 150 370 Z" fill="#7be0b1" opacity="0.65"/>
  </g>

  <!-- Distorted foreground (perspective) -->
  <path d="M0 420 C90 370, 165 460, 260 425 C345 395, 420 470, 512 430 L512 512 L0 512 Z" fill="#0f7a5a" opacity="0.18"/>

  <!-- Surreal sun / spiral portal -->
  <g transform="translate(395 145)" filter="url(#glow)">
    <circle cx="0" cy="0" r="40" fill="#ffd36a"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#ff8f3d" stroke-width="6" opacity="0.65"/>
    <path d="M-48 0 C-30 -30, 30 -30, 48 0 C30 30, -30 30, -48 0" fill="none" stroke="#ffb55c" stroke-width="6" opacity="0.5"/>
    <path d="M-35 -10 C-10 -40, 35 -10, 10 25 C-18 60, -45 25, -20 -5" fill="none" stroke="#7a3cff" stroke-width="4" opacity="0.75"/>
    <!-- small floating stars -->
    <g fill="#ffffff" opacity="0.85">
      <path d="M-10 -85 l6 16 16 6 -16 6 -6 16 -6-16 -16-6 16-6z"/>
      <path d="M65 -25 l4 10 10 4 -10 4 -4 10 -4-10 -10-4 10-4z" opacity="0.8"/>
    </g>
  </g>

  <!-- Melting pocket watch -->
  <g transform="translate(255 250)" filter="url(#softShadow)">
    <!-- top watch body -->
    <path d="M0 -125 C70 -125, 115 -70, 115 0 C115 70, 70 120, 0 120 C-70 120, -115 70, -115 0 C-115 -70, -70 -125, 0 -125 Z" fill="#f2f2f2" stroke="#1e1e1e" stroke-width="4"/>
    <!-- inner face -->
    <circle cx="0" cy="0" r="78" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>

    <!-- watch hands (no numbers) -->
    <path d="M0 -25 L42 0 L0 0 Z" fill="#1e1e1e" opacity="0.9"/>
    <path d="M0 0 L-8 45 L0 0 Z" fill="#1e1e1e" opacity="0.9"/>
    <circle cx="0" cy="0" r="10" fill="#1e1e1e"/>

    <!-- crown -->
    <path d="M-8 -125 C-8 -150, 8 -150, 8 -125 C8 -110, -8 -110, -8 -125 Z" fill="#f2f2f2" stroke="#1e1e1e" stroke-width="4"/>
    <circle cx="0" cy="-150" r="9" fill="#1e1e1e" opacity="0.9"/>

    <!-- melting drips -->
    <g>
      <path d="M-55 60 C-60 95, -70 125, -95 150 C-80 145, -55 152, -40 170 C-35 140, -25 115, -10 95 C-18 85, -35 72, -55 60 Z" fill="#f2f2f2" stroke="#1e1e1e" stroke-width="4" opacity="0.98"/>
      <path d="M5 70 C-5 105, 0 135, 15 165 C25 150, 45 140, 60 125 C60 110, 50 95, 35 82 C25 75, 15 70, 5 70 Z" fill="#f2f2f2" stroke="#1e1e1e" stroke-width="4"/>
      <path d="M55 62 C70 98, 80 115, 100 140 C112 152, 92 175, 70 170 C62 150, 45 132, 35 112 C40 95, 45 78, 55 62 Z" fill="#f2f2f2" stroke="#1e1e1e" stroke-width="4"/>
      <circle cx="0" cy="120" r="30" fill="#f2f2f2" stroke="#1e1e1e" stroke-width="4" opacity="0.98"/>
      <!-- drip glazes -->
      <path d="M-25 118 C-18 138, -18 150, -28 166" fill="none" stroke="#b9b9b9" stroke-width="5" opacity="0.6"/>
      <path d="M18 120 C20 140, 16 155, 10 170" fill="none" stroke="#b9b9b9" stroke-width="5" opacity="0.6"/>
    </g>
  </g>

  <!-- Floating surreal figure (abstract) -->
  <g transform="translate(140 255)" filter="url(#softShadow)">
    <!-- head blob -->
    <path d="M0 -75 C35 -75, 70 -40, 70 0 C70 45, 35 75, 0 75 C-40 75, -75 45, -75 0 C-75 -40, -40 -75, 0 -75 Z" fill="#ffd6c9" stroke="#2a2a2a" stroke-width="4"/>
    <!-- eyes (no text) -->
    <ellipse cx="-18" cy="-10" rx="16" ry="12" fill="#ffffff" stroke="#2a2a2a" stroke-width="3"/>
    <ellipse cx="22" cy="-10" rx="16" ry="12" fill="#ffffff" stroke="#2a2a2a" stroke-width="3"/>
    <circle cx="-18" cy="-8" r="6" fill="#2a2a2a"/>
    <circle cx="22" cy="-8" r="6" fill="#2a2a2a"/>
    <!-- odd smile -->
    <path d="M-15 28 C-5 40, 5 40, 15 28" fill="none" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>

    <!-- floating hair / antennas -->
    <path d="M-55 -40 C-75 -65, -60 -95, -30 -90" fill="none" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
    <path d="M55 -45 C80 -70, 70 -100, 40 -92" fill="none" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-30" cy="-92" r="7" fill="#7a3cff" opacity="0.9"/>
    <circle cx="40" cy="-92" r="7" fill="#7a3cff" opacity="0.9"/>
  </g>

  <!-- Floating birds (abstract shapes) -->
  <g stroke="#1e1e1e" stroke-width="3" fill="none" opacity="0.55">
    <path d="M310 205 C330 190, 350 190, 370 205"/>
    <path d="M312 222 C332 210, 348 210, 368 222"/>
  </g>

  <!-- Ground haze -->
  <path d="M0 430 C120 405, 200 470, 310 440 C395 415, 460 460, 512 445 L512 512 L0 512 Z" fill="#2e8b6e" opacity="0.18"/>
</svg>