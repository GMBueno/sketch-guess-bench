<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- ground -->
  <path d="M70 420 C140 380, 200 395, 256 405 C320 416, 390 395, 442 420 L442 460 L70 460 Z" fill="#d7e7ff"/>
  <path d="M90 430 C150 400, 210 414, 256 422 C314 434, 380 412, 420 430" fill="none" stroke="#a8c7ff" stroke-width="6" stroke-linecap="round"/>

  <!-- torch/hero symbol (bravery) -->
  <g transform="translate(250,160)">
    <!-- sword/torch handle behind -->
    <rect x="-10" y="120" width="20" height="190" rx="10" fill="#5a3a1e"/>
    <rect x="-6" y="110" width="12" height="220" rx="6" fill="#7a4a22"/>

    <!-- shield -->
    <g transform="translate(-70,40)">
      <path d="M90 0 C130 0, 170 18, 170 18 L170 120 C170 190, 132 246, 90 270 C48 246, 10 190, 10 120 L10 18 C10 18, 50 0, 90 0 Z" fill="#2563eb"/>
      <path d="M90 8 C126 8, 160 24, 160 24 L160 120 C160 184, 125 231, 90 253 C55 231, 20 184, 20 120 L20 24 C20 24, 54 8, 90 8 Z" fill="none" stroke="#0b3aa8" stroke-width="6"/>
      <path d="M90 40 C118 40, 140 50, 140 50" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round"/>

      <!-- flame inside shield -->
      <path d="M90 70
               C104 92, 118 100, 118 122
               C118 150, 98 168, 90 178
               C82 168, 62 150, 62 122
               C62 100, 76 92, 90 70 Z" fill="#ff7a18"/>
      <path d="M90 93
               C100 108, 109 114, 109 129
               C109 150, 95 162, 90 170
               C85 162, 71 150, 71 129
               C71 114, 80 108, 90 93 Z" fill="#ffd166"/>

      <!-- sparks -->
      <g fill="#ffe08a">
        <path d="M140 78 L145 90 L157 95 L145 100 L140 112 L135 100 L123 95 L135 90 Z"/>
        <path d="M32 110 L36 120 L47 124 L36 128 L32 138 L28 128 L17 124 L28 120 Z"/>
        <path d="M122 190 L126 198 L134 201 L126 204 L122 212 L118 204 L110 201 L118 198 Z"/>
      </g>

      <!-- courage lightning accent -->
      <path d="M90 170 L70 210 L95 210 L84 250 L112 205 L90 205 L106 170 Z" fill="#f59e0b"/>
    </g>

    <!-- flame at top -->
    <g transform="translate(0,0)">
      <path d="M0 30
               C18 55, 30 68, 30 90
               C30 126, 6 146, 0 158
               C-6 146, -30 126, -30 90
               C-30 68, -18 55, 0 30 Z" fill="#ff5a1f"/>
      <path d="M0 52
               C12 70, 20 80, 20 94
               C20 120, 4 136, 0 144
               C-4 136, -20 120, -20 94
               C-20 80, -12 70, 0 52 Z" fill="#ffd166"/>
      <path d="M-14 60 C-5 58, 5 58, 14 60" stroke="#ffcf66" stroke-width="5" stroke-linecap="round" fill="none"/>
    </g>

    <!-- torch cross guard -->
    <rect x="-38" y="112" width="76" height="14" rx="7" fill="#7c3f1f"/>
    <path d="M-48 119 L-25 98 L-15 105 L-38 126 Z" fill="#6b3418" opacity="0.9"/>
    <path d="M48 119 L25 98 L15 105 L38 126 Z" fill="#6b3418" opacity="0.9"/>
  </g>

  <!-- subtle heroic rays -->
  <g opacity="0.35" stroke="#93c5fd" stroke-width="6" stroke-linecap="round">
    <path d="M256 70 C240 95, 240 125, 256 150" fill="none"/>
    <path d="M220 85 C205 112, 205 135, 220 160" fill="none"/>
    <path d="M292 85 C307 112, 307 135, 292 160" fill="none"/>
  </g>

  <!-- small background glow -->
  <circle cx="256" cy="210" r="120" fill="#bfdbfe" opacity="0.25"/>
</svg>