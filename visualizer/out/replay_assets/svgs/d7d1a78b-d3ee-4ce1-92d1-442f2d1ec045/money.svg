  <path d="M165 190 C190 180 220 175 256 175 C292 175 322 180 347 190"
        fill="none" stroke="#b79652" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- Bag highlights -->
  <path d="M175 220 C175 200 190 190 205 185 C190 215 185 250 185 295
           C185 340 190 375 205 400 C190 385 175 360 175 320 Z"
        fill="#8a6a38" opacity="0.35"/>
  <path d="M337 220 C337 200 322 190 307 185 C322 215 327 250 327 295
           C327 340 322 375 307 400 C322 385 337 360 337 320 Z"
        fill="#6b4f2a" opacity="0.25"/>

  <!-- Coins on top -->
  <g>
    <circle cx="210" cy="305" r="28" fill="#d6a54a" stroke="#8a5a16" stroke-width="5"/>
    <circle cx="210" cy="305" r="12" fill="#f2d089" opacity="0.9"/>

    <circle cx="255" cy="280" r="30" fill="#d6a54a" stroke="#8a5a16" stroke-width="5"/>
    <circle cx="255" cy="280" r="13" fill="#f2d089" opacity="0.9"/>

    <circle cx="305" cy="312" r="26" fill="#d6a54a" stroke="#8a5a16" stroke-width="5"/>
    <circle cx="305" cy="312" r="11" fill="#f2d089" opacity="0.9"/>

    <circle cx="240" cy="340" r="24" fill="#c99235" stroke="#8a5a16" stroke-width="5"/>
    <circle cx="240" cy="340" r="10" fill="#f2d089" opacity="0.85"/>
  </g>

  <!-- A few smaller coins peeking -->
  <g opacity="0.95">
    <circle cx="280" cy="355" r="18" fill="#d6a54a" stroke="#8a5a16" stroke-width="4"/>
    <circle cx="280" cy="355" r="7" fill="#f2d089"/>

    <circle cx="190" cy="335" r="16" fill="#c99235" stroke="#8a5a16" stroke-width="4"/>
    <circle cx="190" cy="335" r="6" fill="#f2d089"/>
