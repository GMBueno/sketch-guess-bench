<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect x="0" y="0" width="512" height="512" fill="#ffffff"/>

  <!-- Ground shadow -->
  <ellipse cx="256" cy="430" rx="150" ry="28" fill="#000000" opacity="0.08"/>

  <!-- Money bag -->
  <path d="M165 165 C165 130 195 105 230 105 L282 105 C317 105 347 130 347 165
           C370 175 385 205 385 235 L385 355
           C385 395 355 425 315 425 L197 425
           C157 425 127 395 127 355 L127 235
           C127 205 142 175 165 165 Z"
        fill="#6b4f2a" stroke="#3b2a14" stroke-width="6"/>

  <!-- Bag opening -->
  <path d="M200 115 C205 140 220 155 256 155 C292 155 307 140 312 115
           C300 105 284 100 256 100 C228 100 212 105 200 115 Z"
        fill="#8a6a38" stroke="#3b2a14" stroke-width="5"/>

  <!-- Drawstring -->
  <path d="M155 180 C190 165 220 160 256 160 C292 160 322 165 357 180"
