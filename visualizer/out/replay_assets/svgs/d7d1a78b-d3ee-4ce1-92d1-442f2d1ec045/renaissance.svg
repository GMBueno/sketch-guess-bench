<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#fff"/>

  <!-- Sunburst (rebirth) -->
  <g transform="translate(256 160)">
    <circle r="52" fill="#FFD36A" stroke="#D39A2E" stroke-width="4"/>
    <g stroke="#FFC24A" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-90" x2="0" y2="-120"/>
      <line x1="0" y1="90" x2="0" y2="120"/>
      <line x1="-90" y1="0" x2="-120" y2="0"/>
      <line x1="90" y1="0" x2="120" y2="0"/>
      <line x1="64" y1="-64" x2="90" y2="-90"/>
      <line x1="-64" y1="-64" x2="-90" y2="-90"/>
      <line x1="64" y1="64" x2="90" y2="90"/>
      <line x1="-64" y1="64" x2="-90" y2="90"/>
      <line x1="40" y1="-86" x2="56" y2="-112"/>
      <line x1="-40" y1="-86" x2="-56" y2="-112"/>
      <line x1="40" y1="86" x2="56" y2="112"/>
      <line x1="-40" y1="86" x2="-56" y2="112"/>
    </g>
  </g>

  <!-- Classical column (Renaissance art/architecture) -->
  <g transform="translate(256 280)">
    <!-- Base -->
    <ellipse cx="0" cy="150" rx="125" ry="28" fill="#E8E8E8" stroke="#B9B9B9" stroke-width="4"/>
    <path d="M -70 135 C -55 95, 55 95, 70 135 L 70 150 C 55 160, -55 160, -70 150 Z" fill="#F2F2F2" stroke="#B9B9B9" stroke-width="4"/>

    <!-- Shaft -->
    <path d="M -55 -90 C -45 -40, -45 10, -58 150 L -15 150 C -12 85, -10 10, -8 -90 Z" fill="#EFEFEF" stroke="#BDBDBD" stroke-width="4"/>
    <path d="M 55 -90 C 45 -40, 45 10, 58 150 L 15 150 C 12 85, 10 10, 8 -90 Z" fill="#EFEFEF" stroke="#BDBDBD" stroke-width="4"/>
    <rect x="-38" y="-90" width="76" height="240" rx="18" fill="#F7F7F7" stroke="#BDBDBD" stroke-width="4"/>

    <!-- Fluting lines -->
    <g stroke="#C7C7C7" stroke-width="3" opacity="0.9">
      <line x1="-28" y1="-80" x2="-28" y2="150"/>
      <line x1="-14" y1="-80" x2="-14" y2="150"/>
      <line x1="0" y1="-80" x2="0" y2="150"/>
      <line x1="14" y1="-80" x2="14" y2="150"/>
      <line x1="28" y1="-80" x2="28" y2="150"/>
    </g>

    <!-- Capital -->
    <path d="M -78 -90 C -60 -130, 60 -130, 78 -90 L 78 -55 C 50 -35, -50 -35, -78 -55 Z" fill="#F7F7F7" stroke="#BDBDBD" stroke-width="4"/>
    <path d="M -95 -95 C -70 -160, 70 -160, 95 -95" fill="none" stroke="#BDBDBD" stroke-width="8" stroke-linecap="round"/>

    <!-- Top ornament (sculptural curve) -->
    <path d="M -35 -120 C -15 -140, 15 -140, 35 -120 C 18 -105, -18 -105, -35 -120 Z" fill="#E9E1D3" stroke="#B8A98C" stroke-width="3"/>
  </g>

  <!-- Laurel wreath (renewal) -->
  <g transform="translate(256 320) rotate(-8)">
    <path d="M -175 -10
             C -215 -30, -218 -85, -170 -105
             C -125 -123, -105 -80, -96 -55
             C -86 -25, -80 5, -92 40
             C -105 82, -145 105, -175 95
             C -215 80, -220 30, -175 -10 Z" fill="none" stroke="#2E9B4F" stroke-width="10" stroke-linecap="round"/>
    <path d="M 175 -10
             C 215 -30, 218 -85, 170 -105
             C 125 -123, 105 -80, 96 -55
             C 86 -25, 80 5, 92 40
             C 105 82, 145 105, 175 95
             C 215 80, 220 30, 175 -10 Z" fill="none" stroke="#2E9B4F" stroke-width="10" stroke-linecap="round"/>

    <!-- Leaves dots -->
    <g fill="#34B760" opacity="0.95">
      <path d="M -160 -95 C -150 -110, -130 -110, -120 -95 C -135 -85, -145 -85, -160 -95 Z"/>
      <path d="M -120 -60 C -110 -75, -90 -75, -80 -60 C -95 -50, -105 -50, -120 -60 Z"/>
      <path d="M -135 -15 C -125 -30, -105 -30, -95 -15 C -110 -5, -120 -5, -135 -15 Z"/>
      <path d="M -150 35 C -140 20, -120 20, -110 35 C -125 45, -135 45, -150 35 Z"/>
      <path d="M 160 -95 C 150 -110, 130 -110, 120 -95 C 135 -85, 145 -85, 160 -95 Z"/>
      <path d="M 120 -60 C 110 -75, 90 -75, 80 -60 C 95 -50, 105 -50, 120 -60 Z"/>
      <path d="M 135 -15 C 125 -30, 105 -30, 95 -15 C 110 -5, 120 -5, 135 -15 Z"/>
      <path d="M 150 35 C 140 20, 120 20, 110 35 C 125 45, 135 45, 150 35 Z"/>
    </g>

    <!-- Ribbon tie -->
    <path d="M -40 70 C -10 40, 10 40, 40 70 C 20 80, -20 80, -40 70 Z" fill="#B74B4B" stroke="#8F3333" stroke-width="3"/>
    <path d="M -25 70 C -10 98, -8 120, -12 140 L 0 140 C 6 120, 5 100, 25 70" fill="#C45A5A" opacity="0.9"/>
    <path d="M 25 70 C 10 98, 8 120, 12 140 L 0 140 C -6 120, -5 100, -25 70" fill="#C45A5A" opacity="0.9"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="256" cy="480" rx="165" ry="18" fill="#000" opacity="0.08"/>

</svg>