<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf2ff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" fill="url(#g)"/>

  <!-- blueprint-like lines (no text) -->
  <g opacity="0.35" stroke="#4b7bb8" stroke-width="3">
    <path d="M70 110 C150 80, 230 90, 310 70" fill="none"/>
    <path d="M90 160 C170 130, 250 140, 330 120" fill="none"/>
    <path d="M110 210 C190 180, 270 190, 350 170" fill="none"/>
  </g>
  <g opacity="0.25" stroke="#4b7bb8" stroke-width="2">
    <line x1="60" y1="320" x2="450" y2="320"/>
    <line x1="100" y1="360" x2="410" y2="360"/>
    <line x1="140" y1="400" x2="370" y2="400"/>
  </g>

  <!-- Gear (engineering) -->
  <g transform="translate(0,0)">
    <g transform="translate(256 270)" fill="none" stroke="#1f2d3d" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <!-- outer gear teeth -->
      <path d="M-120 -20 L-160 -40 L-150 -80 L-200 -85 L-195 -130 L-150 -125 L-138 -165 L-100 -155 L-80 -200 L-40 -170 L-10 -210 L10 -210 L40 -170 L80 -200 L100 -155 L138 -165 L150 -125 L195 -130 L200 -85 L150 -80 L160 -40 L120 -20 L115 20 L160 40 L150 80 L200 85 L195 130 L150 125 L138 165 L100 155 L80 200 L40 170 L10 210 L-10 210 L-40 170 L-80 200 L-100 155 L-138 165 L-150 125 L-195 130 L-200 85 L-150 80 L-160 40 L-120 20 Z" fill="#f1f6ff"/>
      <!-- inner ring -->
      <circle cx="0" cy="0" r="66" fill="#dbe7ff"/>
      <circle cx="0" cy="0" r="32" fill="#ffffff"/>
      <!-- spokes -->
      <g stroke="#1f2d3d" stroke-width="8">
        <line x1="0" y1="-92" x2="0" y2="-30"/>
        <line x1="0" y1="92" x2="0" y2="30"/>
        <line x1="-92" y1="0" x2="-30" y2="0"/>
        <line x1="92" y1="0" x2="30" y2="0"/>
        <line x1="-65" y1="-65" x2="-22" y2="-22"/>
        <line x1="65" y1="65" x2="22" y2="22"/>
        <line x1="-65" y1="65" x2="-22" y2="22"/>
        <line x1="65" y1="-65" x2="22" y2="-22"/>
      </g>
    </g>
  </g>

  <!-- Wrench -->
  <g transform="translate(55 0) rotate(-18 220 265)" stroke-linecap="round" stroke-linejoin="round">
    <!-- handle -->
    <path d="M245 190 C270 165, 305 165, 330 190 L372 232 C390 250, 390 280, 372 298 L344 326 C326 344, 296 344, 278 326 L236 284 C211 259, 211 220, 245 190 Z" fill="#cfe0ff" stroke="#1f2d3d" stroke-width="10"/>
    <!-- shaft cut details -->
    <path d="M256 214 C270 200, 295 200, 309 214 L346 251 C360 265, 360 286, 346 300 L323 323 C309 337, 288 337, 274 323 L237 286 C223 272, 223 241, 256 214 Z" fill="#ffffff" opacity="0.55"/>

    <!-- head / jaw -->
    <g transform="translate(360 235)">
      <path d="M0 -55 C35 -55, 65 -25, 65 10 C65 45, 35 75, 0 75 C-25 75, -45 65, -58 50 L-18 10 L-58 -30 C-45 -45, -25 -55, 0 -55 Z" fill="#bcd0ff" stroke="#1f2d3d" stroke-width="10"/>
      <circle cx="-18" cy="10" r="18" fill="#ffffff" stroke="#1f2d3d" stroke-width="6"/>
      <path d="M-58 0 L-32 0" stroke="#1f2d3d" stroke-width="8"/>
    </g>
  </g>

  <!-- Small triangular ruler -->
  <g transform="translate(308 88) rotate(18)" stroke="#1f2d3d" stroke-width="10" stroke-linejoin="round" fill="#dff0ff" opacity="0.95">
    <path d="M0 60 L130 60 L0 -20 Z"/>
    <path d="M0 -20 L40 25 L130 60 L40 25 Z" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Hard hat hint (optional) -->
  <g transform="translate(135 335)" opacity="0.95">
    <path d="M90 10 C130 -20, 220 -20, 260 10 C275 22, 285 40, 285 58 L285 110 C285 140, 260 165, 230 165 L120 165 C90 165, 65 140, 65 110 L65 58 C65 40, 75 22, 90 10 Z" fill="#e7f2ff" stroke="#1f2d3d" stroke-width="10"/>
    <path d="M120 60 C135 35, 215 35, 230 60" fill="none" stroke="#1f2d3d" stroke-width="8"/>
    <path d="M85 95 C125 115, 225 115, 265 95" fill="none" stroke="#1f2d3d" stroke-width="8"/>
  </g>

</svg>