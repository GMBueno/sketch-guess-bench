  <!-- reposition leaves to look like falling (overlay small duplicates) -->
  <g opacity="0.9">
    <path d="M135 165 C148 145, 174 148, 183 168 C193 191, 180 210, 160 212 C140 214, 123 190, 135 165 Z" fill="#f08a3a"/>
    <path d="M210 270 C225 246, 252 250, 260 274 C268 298, 252 316, 231 318 C209 320, 195 294, 210 270 Z" fill="#d85f2b"/>
    <path d="M335 240 C350 215, 378 220, 387 246 C396 272, 380 290, 358 292 C336 294, 320 266, 335 240 Z" fill="#c95729"/>
