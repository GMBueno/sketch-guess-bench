    <path d="M155 235 C168 210, 195 210, 205 235 C214 259, 201 276, 181 279 C161 281, 146 260, 155 235 Z" fill="#d85f2b"/>
    <path d="M320 150 C335 122, 365 122, 376 152 C386 180, 372 202, 348 203 C327 204, 307 180, 320 150 Z" fill="#db6b2f"/>
    <path d="M360 240 C375 210, 407 212, 418 244 C427 270, 412 292, 388 292 C366 292, 345 268, 360 240 Z" fill="#c95729"/>
    <path d="M255 295 C270 270, 300 270, 310 296 C320 320, 305 340, 283 342 C262 344, 245 320, 255 295 Z" fill="#e06a2e"/>
  </g>

  <!-- leaf motion streaks -->
