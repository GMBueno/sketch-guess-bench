<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Draw Guess Benchmark</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>SVG Draw Guess Benchmark</h1>
        <p>The model draws the hidden word as SVG, we convert it to JPEG for the guesser, and score by guesses used.</p>
        <p><a href="/compare.html">Open Compare View</a></p>
      </header>

      <section class="card actions">
        <div id="status"></div>
        <div id="progress-panel" hidden>
          <div id="progress-text"></div>
          <div class="progress-track">
            <div id="progress-bar"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Rankings</h2>
        <table id="ranking-table">
          <thead>
            <tr>
              <th>Run Time</th>
              <th>Model</th>
              <th>Solved</th>
              <th>Failed</th>
              <th>Total Guesses</th>
              <th>Avg Guesses</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="card replay">
        <h2>Replay</h2>
        <div class="replay-controls">
          <label for="run-select">Run</label>
          <select id="run-select"></select>

          <label for="word-select">Target Word</label>
          <select id="word-select"></select>
        </div>

        <div id="replay-summary"></div>
        <div id="replay-visuals"></div>
        <ol id="replay-turns"></ol>
      </section>
    </main>

    <dialog id="jpeg-modal">
      <div class="jpeg-modal-content">
        <button id="jpeg-modal-close" type="button">Close</button>
        <img id="jpeg-modal-image" alt="JPEG preview" />
      </div>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
